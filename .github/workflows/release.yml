name: Generate Artifacts
on:
  push:
    tags: [v*]

jobs:
  build-desktop:
    permissions:
      contents: write

    name: Build Desktop
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            arch: 'arm64'
            os: 'macos'
            targets: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            arch: 'x64'
            os: 'macos'
            targets: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            arch: 'x64'
            os: 'ubuntu'
            targets: 'x86_64-unknown-linux-gnu'
          - platform: 'ubuntu-22.04-arm'
            args: ''
            arch: 'arm64'
            os: 'ubuntu'
            targets: 'aarch64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: ''
            arch: 'x64'
            os: 'windows'
            targets: 'x86_64-pc-windows-msvc'
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'desktop'
          shared-key: ci
          cache-on-failure: true

      - name: install dependencies (Linux only)
        if: matrix.os == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install client dependencies
        run: npm ci

      - name: Build client
        run: npm run build

      - name: Set version
        run: npm run replace-version
        env:
          RDS_VERSION: ${{ github.ref_name }}

      - name: Inject updater pubkey
        run: node -e "const fs=require('fs'); const path='desktop/tauri.conf.json'; const pubkey=process.env.RDS_TAURI_UPDATER_PUBKEY; if (!pubkey) throw new Error('Missing RDS_TAURI_UPDATER_PUBKEY'); const content=fs.readFileSync(path,'utf8'); fs.writeFileSync(path, content.replace('__RDS_TAURI_UPDATER_PUBKEY__', pubkey));"
        env:
          RDS_TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          RDS_TARGET_ARCH: ${{ matrix.arch }}
          RDS_TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          ENABLE_CODE_SIGNING: ${{ secrets.APPLE_CERTIFICATE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Apple signing stuff
          APPLE_CERTIFICATE: ${{ matrix.os == 'macos' && secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.os == 'macos' && secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ matrix.os == 'macos' && secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ matrix.os == 'macos' && secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos' && secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos' && secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: 'v__VERSION__'
          releaseName: 'Release __VERSION__'
          releaseBody: '[Changelog __VERSION__](https://redis-dash.xuco.me/v/__VERSION__)'
          releaseDraft: true
          prerelease: true
          args: '${{ matrix.args }}'

  build-binary-artifacts:
    permissions:
      contents: write
    needs: build-desktop

    name: Build Binary Artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            arch: 'arm64'
            os: 'macos'
            rust_target: 'aarch64-apple-darwin'
            platform_id: 'darwin-arm64'
            binary_name: 'rds'
          - platform: 'macos-latest'
            arch: 'x64'
            os: 'macos'
            rust_target: 'x86_64-apple-darwin'
            platform_id: 'darwin-x64'
            binary_name: 'rds'
          - platform: 'ubuntu-22.04'
            arch: 'x64'
            os: 'ubuntu'
            rust_target: 'x86_64-unknown-linux-gnu'
            platform_id: 'linux-x64'
            binary_name: 'rds'
          - platform: 'ubuntu-22.04-arm'
            arch: 'arm64'
            os: 'ubuntu'
            rust_target: 'aarch64-unknown-linux-gnu'
            platform_id: 'linux-arm64'
            binary_name: 'rds'
          - platform: 'windows-latest'
            arch: 'x64'
            os: 'windows'
            rust_target: 'x86_64-pc-windows-msvc'
            platform_id: 'win32-x64'
            binary_name: 'rds.exe'
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'native'
          shared-key: ci
          cache-on-failure: true

      - name: install dependencies (Linux only)
        if: matrix.os == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install client dependencies
        run: npm ci

      - name: Set version
        run: npm run replace-version
        env:
          RDS_VERSION: ${{ github.ref_name }}

      - name: Build app assets
        run: npm run build:app

      - name: Copy app assets into distribution directory
        run: npm run copy:app

      - name: Build native binary for target
        run: npm run build:binary
        env:
          CARGO_BUILD_TARGET: ${{ matrix.rust_target }}
          RDS_PLATFORM_ID: ${{ matrix.platform_id }}
          RDS_BINARY_NAME: ${{ matrix.binary_name }}

      - name: Prepare standalone install bundle
        run: npm run package:binary
        env:
          RDS_PLATFORM_ID: ${{ matrix.platform_id }}
          RDS_BINARY_NAME: ${{ matrix.binary_name }}

      - name: Prepare binary release asset
        shell: bash
        run: |
          mkdir -p release-assets
          if [ "${{ matrix.os }}" = "windows" ]; then
            cp "dist/native/${{ matrix.platform_id }}/${{ matrix.binary_name }}" "release-assets/rds-${{ matrix.platform_id }}.exe"
          else
            cp "dist/native/${{ matrix.platform_id }}/${{ matrix.binary_name }}" "release-assets/rds-${{ matrix.platform_id }}"
          fi
          cp "dist/binary/rds-${{ matrix.platform_id }}.tar.gz" "release-assets/rds-${{ matrix.platform_id }}.tar.gz"

      - name: Upload binary assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: true
          files: release-assets/*
          overwrite_files: true
